name: Deploy Documentation

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'dimensionality_manuscript/docs/shared_variance.md'
      - 'mkdocs.yml'
      - 'vrAnalysis/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:  # Allow manual triggering

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mkdocs mkdocs-material mkdocstrings[python]

      - name: Render shared variance HTML
        run: |
          docker run --rm \
            -v "${GITHUB_WORKSPACE}:/data" \
            -w /data \
            --user "$(id -u):$(id -g)" \
            pandoc/core:3.1 \
            dimensionality_manuscript/docs/shared_variance.md \
            --from=gfm+tex_math_dollars \
            --to=html5 \
            --standalone \
            --katex \
            --metadata title="Shared Variance Exposition" \
            --output=dimensionality_manuscript/docs/shared_variance.html

      - name: Build documentation
        run: mkdocs build

      - name: Include shared variance HTML
        run: |
          mkdir -p site/dimensionality_manuscript/docs
          cp dimensionality_manuscript/docs/shared_variance.html site/dimensionality_manuscript/docs/shared_variance.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        if: github.ref == 'refs/heads/main'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          # The action will automatically create the 'gh-pages' branch if it doesn't exist
          # and push the built documentation to it
          cname: false  # Set to your custom domain if you have one

